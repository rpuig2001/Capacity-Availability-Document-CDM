name: Build global/all aggregates

on:
  push:
    branches: [ main ]   # change if your default branch is different
    paths:
      - "data/**/procedures.txt"
      - "data/**/profile_restrictions.txt"
      - "data/**/volumes.geojson"
      - "scripts/build-global-all.mjs"
      - "package.json"
      - "package-lock.json"

permissions:
  contents: write

concurrency:
  group: build-global-all-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate global/ files
        run: node scripts/build-global-all.mjs

      - name: Commit and push (if changed)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add global/procedures.txt global/profile_restrictions.txt global/volumes.geojson

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "updated global files"
          git push